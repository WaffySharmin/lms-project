{% extends "base.html" %}
{% block content %}
<h2>My Courses (Teaching)</h2>
<div class="row">
    {% for course in courses %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ course.title }}</h5>
                <p>{{ course.is_published|yesno:"Published,Draft" }}</p>
            </div>
        </div>
    </div>
    {% empty %}
    <p>You haven't created any course yet.</p>
    {% endfor %}
</div>
{% endblock %}
